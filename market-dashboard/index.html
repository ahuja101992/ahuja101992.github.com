<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Market" />
  <meta name="theme-color" content="#07090c" />
  <title>Market Brief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#07090c; --surface:#0d1117; --card:#111820; --border:#1c2636;
      --amber:#f59e0b; --amber-dim:rgba(245,158,11,0.12); --amber-glow:rgba(245,158,11,0.25);
      --green:#3fb950; --red:#f85149; --red-dim:rgba(248,81,73,0.10); --red-border:rgba(248,81,73,0.30);
      --blue:#58a6ff; --purple:#bc8cff; --text:#e6edf3; --muted:#7d8590; --dim:#30363d;
      --mono:'Space Mono',monospace; --sans:'Syne',sans-serif; --radius:12px; --radius-sm:7px;
    }
    html { background:var(--bg); }
    body { font-family:var(--sans); background:var(--bg); color:var(--text);
      min-height:100vh; padding-bottom:env(safe-area-inset-bottom); -webkit-font-smoothing:antialiased; }
    .mono { font-family:var(--mono); }
    .header { position:sticky; top:0; z-index:100; background:rgba(7,9,12,0.95);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border); padding:12px 16px 0;
      padding-top:max(12px,env(safe-area-inset-top)); }
    .header-row { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
    .header-title { font-family:var(--sans); font-size:11px; font-weight:800;
      letter-spacing:0.18em; text-transform:uppercase; }
    .header-meta { font-family:var(--mono); font-size:10px; color:var(--dim); margin-top:2px; }
    .vix-label { font-family:var(--mono); font-size:9px; color:var(--dim); letter-spacing:0.1em; text-transform:uppercase; }
    .vix-value { font-family:var(--mono); font-weight:700; font-size:24px; line-height:1; }
    .tabs { display:flex; gap:3px; padding-bottom:1px; overflow-x:auto; }
    .tab { padding:7px 14px; border-radius:var(--radius-sm) var(--radius-sm) 0 0; border:none;
      background:transparent; color:var(--muted); font-family:var(--mono); font-size:11px;
      cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
    .tab.active { color:var(--amber); border-bottom-color:var(--amber); background:var(--amber-dim); }
    .content { padding:16px; padding-bottom:calc(80px + env(safe-area-inset-bottom)); max-width:600px; margin:0 auto; }
    .card { border-radius:var(--radius); border:1px solid var(--border); background:var(--card); padding:13px 15px; margin-bottom:9px; }
    .card-surface { border-radius:var(--radius); border:1px solid var(--border); background:var(--surface); padding:13px 15px; margin-bottom:9px; }
    .anomaly-card { border-radius:var(--radius); border:1px solid var(--red-border); background:var(--red-dim);
      padding:13px 15px; margin-bottom:9px; position:relative; overflow:hidden; }
    .anomaly-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--red); }
    .cash-card { border-radius:var(--radius); border:1px solid var(--border); background:var(--amber-dim); padding:13px 15px; margin-bottom:9px; }
    .section-label { font-family:var(--mono); font-size:10px; color:var(--muted); text-transform:uppercase;
      letter-spacing:0.15em; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
    .section-label .sub { font-size:10px; color:var(--dim); }
    .pill { font-family:var(--mono); font-size:10px; padding:2px 8px; border-radius:4px; display:inline-block; }
    .pill-warn { background:rgba(245,158,11,0.15); color:var(--amber); }
    .pill-success { background:rgba(63,185,80,0.15); color:var(--green); }
    .pill-danger { background:rgba(248,81,73,0.15); color:var(--red); }
    .pill-info { background:rgba(88,166,255,0.15); color:var(--blue); }
    .pill-dim { background:var(--surface); color:var(--muted); }
    .divider { height:1px; background:var(--border); margin:12px 0; }
    .table-wrap { border-radius:var(--radius); border:1px solid var(--border); background:var(--surface); overflow:hidden; margin-bottom:9px; }
    .table-row { display:flex; justify-content:space-between; align-items:center; padding:10px 15px; border-bottom:1px solid var(--border); }
    .table-row:last-child { border-bottom:none; }
    .etf-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(72px,1fr)); gap:8px; margin-bottom:10px; }
    .etf-cell { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px 10px; text-align:center; }
    .macro-row { display:flex; justify-content:space-between; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; }
    .macro-row:last-child { border-bottom:none; }
    .no-alerts { border-radius:var(--radius); border:1px solid var(--border); background:var(--surface);
      padding:10px 15px; margin-bottom:9px; display:flex; align-items:center; gap:10px;
      font-size:12px; color:var(--dim); font-family:var(--mono); }
    .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:14px; }
    .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--amber);
      border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .fab { position:fixed; bottom:calc(24px + env(safe-area-inset-bottom)); right:20px;
      width:52px; height:52px; border-radius:50%; background:var(--amber); border:none;
      color:#000; font-size:22px; cursor:pointer; box-shadow:0 4px 24px var(--amber-glow);
      display:flex; align-items:center; justify-content:center; font-weight:700; z-index:50; }
    .btn-primary { padding:10px 24px; border-radius:var(--radius-sm); background:var(--amber);
      border:none; color:#000; font-family:var(--mono); font-size:12px; font-weight:700; cursor:pointer; }
    input:focus { border-color:var(--amber) !important; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .pulsing { animation:pulse 1.2s ease-in-out infinite; }
  </style>
</head>
<body>
<div id="header"></div>
<div id="content" class="content"></div>
<button class="fab" id="fab" onclick="refresh()">↻</button>

<script>
const WORKER_URL = "https://late-firefly-cd42-market-brief.ahuja101992-753.workers.dev";

let DATA = null;
let activeTab = "brief";
let briefLoaded = false;

// ── Fetch brief ────────────────────────────────────────────────────────────
async function fetchData() {
  showLoading();
  try {
    const res = await fetch(WORKER_URL);
    if (!res.ok) throw new Error("Worker " + res.status);
    DATA = await res.json();
    if (DATA.error) throw new Error(DATA.error);
    briefLoaded = true;
    renderAll();
  } catch (e) {
    showError(e.message);
  }
}

async function refresh() {
  const fab = document.getElementById("fab");
  fab.style.animation = "spin 0.7s linear infinite";
  if (activeTab === "brief" || activeTab === "conviction" || activeTab === "macro") {
    await fetchData();
  } else if (activeTab === "watchlist") {
    await loadWatchlist();
    renderWatchlist();
  }
  fab.style.animation = "";
}

function showLoading() {
  document.getElementById("content").innerHTML = `<div class="loading"><div class="spinner"></div><p class="mono" style="font-size:11px;color:var(--dim);letter-spacing:0.15em">LOADING FROM DRIVE...</p></div>`;
}

function showError(msg) {
  document.getElementById("content").innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:32px;text-align:center"><div style="font-size:40px;margin-bottom:14px">⚠️</div><p class="mono" style="font-size:13px;color:var(--red);margin-bottom:8px">Could not load brief</p><p style="font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6;max-width:300px">${msg}</p><button class="btn-primary" onclick="fetchData()">Retry</button></div>`;
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderAll() {
  renderHeader();
  renderTab(activeTab);
}

function renderHeader() {
  if (!DATA) return;
  const vixColor = DATA.vix > 20 ? "var(--red)" : DATA.vix > 15 ? "var(--amber)" : "var(--green)";
  const tone = DATA.tone || "—";
  const toneClass = tone.includes("risk-on") ? "pill-success" : tone.includes("off") ? "pill-danger" : "pill-warn";
  const tabs = [
    { id:"brief", label:"Brief" },
    { id:"conviction", label:"Conviction" },
    { id:"macro", label:"Macro" },
    { id:"watchlist", label:"📋 Watchlist" },
  ];
  document.getElementById("header").innerHTML = `
    <div class="header">
      <div class="header-row">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
            <span class="header-title">Market Brief</span>
            <span class="pill ${toneClass}">${tone.split(";")[0]}</span>
          </div>
          <p class="header-meta">${DATA.run_date||""} ${DATA.run_time_et||""} · ${DATA.market_state||""}</p>
        </div>
        <div style="text-align:right">
          <div class="vix-label">VIX</div>
          <div class="vix-value" style="color:${vixColor}">${DATA.vix||"—"}</div>
        </div>
      </div>
      <div class="tabs">
        ${tabs.map(t => `<button class="tab ${activeTab===t.id?"active":""}" onclick="switchTab('${t.id}')">${t.label}</button>`).join("")}
      </div>
    </div>`;
}

function switchTab(tab) {
  activeTab = tab;
  renderHeader();
  renderTab(tab);
}

function renderTab(tab) {
  if (tab === "brief") renderBrief();
  else if (tab === "conviction") renderConviction();
  else if (tab === "macro") renderMacro();
  else if (tab === "watchlist") renderWatchlist();
}

// ── Brief tab ──────────────────────────────────────────────────────────────
function renderBrief() {
  if (!DATA) return;
  const anomalies = DATA.anomalies || [];
  const buys = DATA.recommended_buys || [];
  const holdings = (DATA.holdings || []).filter(h => h.ticker && h.ticker !== "EXAMPLE");
  let html = "";

  html += `<p class="section-label">⚡ Anomaly Alerts <span class="sub">${anomalies.length} today</span></p>`;
  if (anomalies.length) {
    anomalies.forEach(a => {
      html += `<div class="anomaly-card">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span class="mono" style="font-weight:700;font-size:16px;color:var(--red)">${a.ticker}</span>
          <span style="font-size:10px;color:var(--dim);font-family:var(--mono)">${a.source||""}</span>
        </div>
        <p style="font-size:13px;line-height:1.5;margin-bottom:8px;color:var(--text)">${a.headline}</p>
        <span style="font-size:11px;color:var(--amber)">→ ${a.suggestion}</span>
      </div>`;
    });
  } else {
    html += `<div class="no-alerts">⚡ No anomaly alerts today</div>`;
  }

  html += `<div class="divider"></div>`;
  html += `<p class="section-label">🎯 Buy This Period <span class="sub">$${DATA.total_deployed_usd||0} deployed · $${DATA.cash_buffer_usd||0} cash</span></p>`;

  buys.forEach((b, i) => {
    if (b.ticker === "CASH") {
      html += `<div class="cash-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span class="mono" style="font-weight:700;font-size:14px;color:var(--amber)">💵 CASH RESERVE</span>
          <span class="mono" style="font-size:14px;color:var(--amber)">$${b.amount_usd}</span>
        </div>
        <p style="font-size:13px;line-height:1.5;color:var(--muted)">${b.reason}</p>
      </div>`;
      return;
    }
    const cv = typeof b.conviction === "number" ? b.conviction : parseInt(b.conviction) || 0;
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="mono" style="font-size:10px;color:var(--dim)">#${i+1}</span>
          <span class="mono" style="font-weight:700;font-size:19px">${b.ticker}</span>
          <span class="mono" style="font-weight:700;font-size:16px;color:var(--amber)">$${b.amount_usd}</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${b.price_at_flag?`<span class="mono" style="font-size:11px;color:var(--muted)">$${b.price_at_flag}</span>`:""}
          <span class="pill pill-dim">${b.composite||b.conviction||""}</span>
        </div>
      </div>
      ${convBarsHtml(cv)}
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:5px">
        <p style="font-size:12px;line-height:1.5;margin:0"><span style="color:var(--green);margin-right:5px">✓</span>${b.why}</p>
        ${b.risk?`<p style="font-size:12px;line-height:1.5;color:var(--muted);margin:0"><span style="color:var(--red);margin-right:5px">⚠</span>${b.risk}</p>`:""}
      </div>
    </div>`;
  });

  if (holdings.length) {
    html += `<div class="divider"></div>`;
    html += `<p class="section-label">💼 Your Holdings</p>`;
    html += `<div class="table-wrap">`;
    holdings.forEach(h => {
      const pos = (h.gain_pct || 0) >= 0;
      html += `<div class="table-row">
        <div>
          <span class="mono" style="font-weight:700;font-size:13px">${h.ticker}</span>
          ${h.note&&h.note!=="quiet"?`<p style="font-size:11px;color:var(--muted);margin-top:2px">${h.note}</p>`:""}
        </div>
        <div style="text-align:right">
          ${h.current_price?`<span class="mono" style="font-size:12px;color:var(--muted)">$${h.current_price}</span>`:""}
          ${h.gain_pct!=null?`<span class="mono" style="font-size:12px;font-weight:700;color:${pos?"var(--green)":"var(--red)"}"> ${pos?"▲":"▼"} ${Math.abs(h.gain_pct).toFixed(1)}%</span>`:""}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<p class="mono" style="text-align:center;font-size:10px;color:var(--dim);margin-top:12px">Not investment advice · ${DATA.run_date||""}</p>`;
  document.getElementById("content").innerHTML = html;
}

// ── Conviction tab ─────────────────────────────────────────────────────────
function renderConviction() {
  if (!DATA) return;
  const list = DATA.conviction_list_summary || [];
  let html = `<p class="section-label">🎯 Conviction List <span class="sub">${list.length} names</span></p>`;
  html += `<div class="table-wrap">`;
  list.forEach(c => {
    const sc = c.status&&c.status.includes("Active")&&!c.status.includes("Watch")?"pill-success":c.status&&(c.status.includes("Contrarian")||c.status.includes("Low Priority"))?"pill-danger":c.status&&c.status.includes("Candidate")?"pill-info":"pill-warn";
    const cv = typeof c.conviction === "number" ? c.conviction : parseInt(c.conviction) || 0;
    html += `<div class="table-row" style="align-items:flex-start;padding:12px 15px">
      <div>
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">
          <span class="mono" style="font-weight:700;font-size:13px">${c.ticker}</span>
          <span class="pill ${sc}">${c.status||""}</span>
        </div>
        ${c.catalyst?`<p style="font-size:11px;color:var(--muted)">${c.catalyst}</p>`:""}
      </div>
      <div style="text-align:right;flex-shrink:0">
        ${c.conviction!=null?convBarsHtml(cv):""}
        ${c.runs_flagged!=null?`<div class="mono" style="font-size:10px;color:var(--dim);margin-top:3px">${c.runs_flagged} runs</div>`:""}
      </div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}

// ── Macro tab ──────────────────────────────────────────────────────────────
function renderMacro() {
  if (!DATA) return;
  const m = DATA.macro || {};
  const etfs = Object.entries(DATA.sector_etfs || {}).filter(([,v]) => v.change_pct != null);
  let html = `<p class="section-label">📊 Macro Snapshot</p>`;
  if (etfs.length) {
    html += `<div class="etf-grid">`;
    etfs.forEach(([k,v]) => {
      const pos = v.change_pct >= 0;
      html += `<div class="etf-cell"><div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:3px">${k}</div><div class="mono" style="font-weight:700;font-size:14px;color:${pos?"var(--green)":"var(--red)"}">${pos?"+":""}${v.change_pct.toFixed(1)}%</div></div>`;
    });
    html += `</div>`;
  }
  const rows = [
    ["NFP May", m.nfp_may_2026_actual?`${Math.round(m.nfp_may_2026_actual/1000)}K actual vs ${Math.round(m.nfp_may_2026_consensus/1000)}K expected (+${m.nfp_surprise_pct}% beat)`:null],
    ["Unemployment", m.unemployment_pct?`${m.unemployment_pct}%`:null],
    ["Wages YoY", m.wage_growth_yoy_pct?`${m.wage_growth_yoy_pct}%`:null],
    ["Rate hike prob", m.rate_hike_probability_yearend_pct?`${m.rate_hike_probability_yearend_pct}% year-end`:null],
    ["10Y yield", m.ten_year_yield_pct?`${m.ten_year_yield_pct}%`:null],
    ["BTC", m.btc_usd?`$${m.btc_usd.toLocaleString()}`:null],
    ["Geopolitical", m.geopolitical],
    ["Next CPI", m.cpi_next], ["Next FOMC", m.fomc_next], ["MRK PDUFA", m.mrk_pdufa],
  ].filter(([,v])=>v);
  html += `<div class="table-wrap" style="padding:0 15px">`;
  rows.forEach(([k,v]) => {
    html += `<div class="macro-row"><span class="mono" style="color:var(--muted);min-width:120px">${k}</span><span style="color:var(--text);text-align:right;flex:1">${v}</span></div>`;
  });
  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}

// ── Watchlist tab ──────────────────────────────────────────────────────────
function renderWatchlist() {
  if (!DATA) return;
  const stocks = DATA.watchlist_analysis || [];
  let html = `<p class="section-label">📋 My Watchlist <span class="sub">${stocks.length} stocks · updated ${DATA.run_time_et||""}</span></p>`;

  if (!stocks.length) {
    html += `<div class="card-surface" style="text-align:center;padding:36px">
      <p style="font-size:36px;margin-bottom:10px">📋</p>
      <p class="mono" style="font-size:13px;color:var(--muted)">Watchlist is empty</p>
      <p style="font-size:12px;color:var(--dim);margin-top:6px;line-height:1.6">
        Open Google Drive → market-briefs → watchlist.md<br>
        Add one stock per line:<br>
        <span class="mono" style="color:var(--amber)">MU — Micron Technology</span><br>
        Claude analyzes every ticker each run.
      </p>
    </div>`;
  } else {
    stocks.forEach(s => {
      const v = s.verdict || "WATCH";
      const verdictColor = v==="BUY"?"var(--green)":v==="AVOID"?"var(--red)":"var(--amber)";
      const verdictBg   = v==="BUY"?"rgba(63,185,80,0.12)":v==="AVOID"?"rgba(248,81,73,0.12)":"rgba(245,158,11,0.12)";
      const verdictBorder = v==="BUY"?"rgba(63,185,80,0.25)":v==="AVOID"?"rgba(248,81,73,0.25)":"rgba(245,158,11,0.25)";
      const cp = s.change_pct;
      const changeColor = cp != null && cp >= 0 ? "var(--green)" : "var(--red)";
      const horizonColor = {"this week":"var(--amber)","2-4 weeks":"var(--blue)","longer term":"var(--purple)"}[s.time_horizon]||"var(--muted)";

      html += `<div class="card" style="border-color:${verdictBorder};margin-bottom:9px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
              <span class="mono" style="font-weight:700;font-size:17px">${s.ticker}</span>
              <span style="font-size:11px;padding:3px 9px;border-radius:4px;font-family:var(--mono);
                font-weight:700;background:${verdictBg};color:${verdictColor}">${v}</span>
            </div>
            <p style="font-size:11px;color:var(--muted)">${s.name||"—"}</p>
          </div>
          <div style="text-align:right">
            ${s.current_price?`<div class="mono" style="font-size:16px;font-weight:700">$${s.current_price}</div>`:""}
            ${cp!=null?`<div class="mono" style="font-size:11px;color:${changeColor}">${cp>=0?"▲":"▼"} ${Math.abs(cp).toFixed(1)}%</div>`:""}
          </div>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:5px">
          <p style="font-size:12px;line-height:1.5;margin:0">
            <span style="color:var(--green);margin-right:5px">✓</span>${s.price_context||"—"}
          </p>
          <p style="font-size:12px;line-height:1.5;color:var(--muted);margin:0">
            <span style="color:var(--amber);margin-right:5px">→</span>${s.catalyst||"—"}
          </p>
          <p style="font-size:12px;line-height:1.5;color:var(--muted);margin:0">
            <span style="color:var(--red);margin-right:5px">⚠</span>${s.risk||"—"}
          </p>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:3px">
            <span class="pill pill-dim">${s.confidence||"—"} confidence</span>
            <span class="pill" style="background:transparent;color:${horizonColor};border:1px solid ${horizonColor}20">${s.time_horizon||"—"}</span>
          </div>
        </div>
      </div>`;
    });
  }

  html += `<div class="card-surface" style="margin-top:4px">
    <p style="font-size:11px;color:var(--muted);line-height:1.6">
      <span style="color:var(--text)">To add stocks:</span> Open Google Drive →
      <span class="mono" style="color:var(--amber)">market-briefs/watchlist.md</span>
      → add a line like <span class="mono" style="color:var(--amber)">MU — Micron Technology</span>.
      Results update every routine run.
    </p>
  </div>`;
  html += `<p class="mono" style="text-align:center;font-size:10px;color:var(--dim);margin-top:8px">Analysis by Claude · Refreshes with routine · Not investment advice</p>`;
  document.getElementById("content").innerHTML = html;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function convBarsHtml(v, max) {
  max = max || 5;
  let html = `<div style="display:inline-flex;align-items:center;gap:3px">`;
  for (let i = 0; i < max; i++) {
    html += `<div style="width:11px;height:3px;border-radius:2px;background:${i<v?"var(--amber)":"var(--dim)"}"></div>`;
  }
  html += `<span class="mono" style="font-size:10px;color:var(--dim);margin-left:5px">${v}/${max}</span></div>`;
  return html;
}

(async () => {
  showLoading();
  await fetchData();
})();
