<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Market"/>
  <meta name="theme-color" content="#07090c"/>
  <title>Market Brief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="manifest.json"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#07090c;--surface:#0d1117;--card:#111820;--border:#1c2636;
      --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.12);--amber-glow:rgba(245,158,11,0.25);
      --green:#3fb950;--green-dim:rgba(63,185,80,0.12);
      --red:#f85149;--red-dim:rgba(248,81,73,0.10);--red-border:rgba(248,81,73,0.30);
      --blue:#58a6ff;--purple:#bc8cff;--text:#e6edf3;--muted:#7d8590;--dim:#30363d;
      --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;--radius:12px;--radius-sm:7px;
    }
    html{background:var(--bg)}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;
      padding-bottom:env(safe-area-inset-bottom);-webkit-font-smoothing:antialiased}
    .mono{font-family:var(--mono)}
    .header{position:sticky;top:0;z-index:100;background:rgba(7,9,12,0.95);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);padding:12px 16px 0;
      padding-top:max(12px,env(safe-area-inset-top))}
    .header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .tabs{display:flex;gap:3px;padding-bottom:1px;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{padding:7px 12px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;border:none;
      background:transparent;color:var(--muted);font-family:var(--mono);font-size:10px;
      cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
    .tab.active{color:var(--amber);border-bottom-color:var(--amber);background:var(--amber-dim)}
    .content{padding:16px;padding-bottom:calc(80px + env(safe-area-inset-bottom));max-width:600px;margin:0 auto}
    .card{border-radius:var(--radius);border:1px solid var(--border);background:var(--card);padding:13px 15px;margin-bottom:9px}
    .card-surface{border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);padding:13px 15px;margin-bottom:9px}
    .anomaly-card{border-radius:var(--radius);border:1px solid var(--red-border);background:var(--red-dim);
      padding:13px 15px;margin-bottom:9px;position:relative;overflow:hidden}
    .anomaly-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
    .cash-card{border-radius:var(--radius);border:1px solid var(--border);background:var(--amber-dim);padding:13px 15px;margin-bottom:9px}
    .section-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;
      letter-spacing:0.15em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
    .pill{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;display:inline-block}
    .pill-warn{background:rgba(245,158,11,0.15);color:var(--amber)}
    .pill-success{background:rgba(63,185,80,0.15);color:var(--green)}
    .pill-danger{background:rgba(248,81,73,0.15);color:var(--red)}
    .pill-info{background:rgba(88,166,255,0.15);color:var(--blue)}
    .pill-dim{background:var(--surface);color:var(--muted)}
    .divider{height:1px;background:var(--border);margin:12px 0}
    .table-wrap{border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);overflow:hidden;margin-bottom:9px}
    .table-row{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;border-bottom:1px solid var(--border)}
    .table-row:last-child{border-bottom:none}
    .no-alerts{border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);
      padding:10px 15px;margin-bottom:9px;display:flex;align-items:center;gap:10px;
      font-size:12px;color:var(--dim);font-family:var(--mono)}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px}
    .spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--amber);
      border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:20px;
      width:52px;height:52px;border-radius:50%;background:var(--amber);border:none;
      color:#000;font-size:22px;cursor:pointer;box-shadow:0 4px 24px var(--amber-glow);
      display:flex;align-items:center;justify-content:center;font-weight:700;z-index:50}
    .btn-primary{padding:10px 24px;border-radius:var(--radius-sm);background:var(--amber);
      border:none;color:#000;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer}
    /* Donut chart */
    .donut-wrap{position:relative;width:140px;height:140px;flex-shrink:0}
    .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    /* Hit rate bars */
    .hit-bar-bg{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px}
    .hit-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
  </style>
</head>
<body>
<div id="header"></div>
<div id="content" class="content"></div>
<button class="fab" id="fab" onclick="refresh()">↻</button>

<script>
const WORKER_URL = "https://late-firefly-cd42-market-brief.ahuja101992-753.workers.dev";
let DATA = null;
let activeTab = "brief";

async function fetchData() {
  showLoading();
  try {
    const res = await fetch(WORKER_URL);
    if (!res.ok) throw new Error("Worker " + res.status);
    DATA = await res.json();
    if (DATA.error) throw new Error(DATA.error);
    renderAll();
  } catch(e) { showError(e.message); }
}

async function refresh() {
  const fab = document.getElementById("fab");
  fab.style.animation = "spin 0.7s linear infinite";
  await fetchData();
  fab.style.animation = "";
}

function showLoading() {
  document.getElementById("header").innerHTML = "";
  document.getElementById("content").innerHTML = `<div class="loading"><div class="spinner"></div><p class="mono" style="font-size:11px;color:var(--dim);letter-spacing:0.15em">LOADING FROM DRIVE...</p></div>`;
}

function showError(msg) {
  document.getElementById("content").innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:32px;text-align:center"><div style="font-size:40px;margin-bottom:14px">⚠️</div><p class="mono" style="font-size:13px;color:var(--red);margin-bottom:8px">Could not load brief</p><p style="font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6;max-width:300px">${msg}</p><button class="btn-primary" onclick="fetchData()">Retry</button></div>`;
}

function renderAll() { renderHeader(); renderTab(activeTab); }

function renderHeader() {
  if (!DATA) return;
  const vixColor = DATA.vix > 20 ? "var(--red)" : DATA.vix > 15 ? "var(--amber)" : "var(--green)";
  const tone = DATA.tone || "—";
  const toneClass = tone.includes("risk-on") ? "pill-success" : tone.includes("off") ? "pill-danger" : "pill-warn";
  const hasAnomaly = (DATA.anomalies||[]).length > 0;
  const tabs = [
    {id:"brief",label:"Brief"},
    {id:"portfolio",label:"💼 Portfolio"},
    {id:"watchlist",label:"📋 Watchlist"},
    {id:"hitrate",label:"📊 Hit Rate"},
    {id:"conviction",label:"Conviction"},
    {id:"macro",label:"Macro"},
  ];
  document.getElementById("header").innerHTML = `
    <div class="header">
      <div class="header-row">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
            <span class="mono" style="font-weight:800;font-size:12px;letter-spacing:0.12em">MARKET BRIEF</span>
            <span class="pill ${toneClass}">${(tone.split(";")[0]).substring(0,20)}</span>
            ${hasAnomaly?`<span class="pill pill-danger">🚨 ALERT</span>`:""}
          </div>
          <p class="mono" style="font-size:10px;color:var(--dim)">${DATA.run_date||""} ${DATA.run_time_et||""} · ${DATA.market_state||""}</p>
        </div>
        <div style="text-align:right">
          <div class="mono" style="font-size:9px;color:var(--dim)">VIX</div>
          <div class="mono" style="font-weight:800;font-size:22px;color:${vixColor}">${DATA.vix||"—"}</div>
        </div>
      </div>
      <div class="tabs">${tabs.map(t=>`<button class="tab ${activeTab===t.id?"active":""}" onclick="switchTab('${t.id}')">${t.label}</button>`).join("")}</div>
    </div>`;
}

function switchTab(tab) { activeTab = tab; renderHeader(); renderTab(tab); }

function renderTab(tab) {
  if (tab==="brief") renderBrief();
  else if (tab==="portfolio") renderPortfolio();
  else if (tab==="watchlist") renderWatchlist();
  else if (tab==="hitrate") renderHitRate();
  else if (tab==="conviction") renderConviction();
  else renderMacro();
}

// ── Brief ──────────────────────────────────────────────────────────────────
function renderBrief() {
  const anomalies = DATA.anomalies||[];
  const buys = DATA.recommended_buys||[];
  const holdings = (DATA.holdings||[]).filter(h=>h.ticker&&h.ticker!=="EXAMPLE");
  let html = "";

  // Anomalies first
  if (anomalies.length) {
    html += `<p class="section-label">⚡ Anomaly Alerts <span style="font-size:10px;color:var(--dim)">${anomalies.length} today</span></p>`;
    anomalies.forEach(a => {
      html += `<div class="anomaly-card">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span class="mono" style="font-weight:700;font-size:16px;color:var(--red)">${a.ticker}</span>
          <span style="font-size:10px;color:var(--dim);font-family:var(--mono)">${a.source||""}</span>
        </div>
        <p style="font-size:13px;line-height:1.5;margin-bottom:8px">${a.headline}</p>
        <span style="font-size:11px;color:var(--amber)">→ ${a.suggestion}</span>
      </div>`;
    });
  } else {
    html += `<div class="no-alerts">⚡ No anomaly alerts today</div>`;
  }

  html += `<div class="divider"></div>`;

  // Holdings summary (compact)
  if (holdings.length) {
    const p = DATA.portfolio||{};
    const pos = (p.total_gain_pct||0) >= 0;
    html += `<div class="card-surface" style="margin-bottom:9px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span class="mono" style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Portfolio</span>
        <span class="mono" style="font-size:12px;color:${pos?"var(--green)":"var(--red)"};font-weight:700">${pos?"▲":"▼"} ${Math.abs(p.total_gain_pct||0).toFixed(1)}% ($${Math.abs(p.total_gain_usd||0).toFixed(0)})</span>
      </div>
      ${holdings.map(h=>{
        const hpos = (h.gain_pct||0)>=0;
        return `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)">
          <span class="mono" style="font-size:12px">${h.ticker}</span>
          <span class="mono" style="font-size:11px;color:${hpos?"var(--green)":"var(--red)"}">${hpos?"▲":"▼"} ${Math.abs(h.gain_pct||0).toFixed(1)}%</span>
        </div>`;
      }).join("")}
    </div>`;
  }

  // Buys
  html += `<p class="section-label">🎯 Buy This Period <span style="font-size:10px;color:var(--dim)">$${DATA.total_deployed_usd||0} of $500</span></p>`;
  buys.forEach((b,i) => {
    if (b.ticker==="CASH") {
      html += `<div class="cash-card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="mono" style="font-weight:700;font-size:14px;color:var(--amber)">💵 CASH</span><span class="mono" style="font-size:14px;color:var(--amber)">$${b.amount_usd}</span></div><p style="font-size:13px;line-height:1.5;color:var(--muted)">${b.reason||b.why||""}</p></div>`;
      return;
    }
    const cv = typeof b.conviction==="number"?b.conviction:parseInt(b.conviction)||0;
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="mono" style="font-size:10px;color:var(--dim)">#${i+1}</span>
          <span class="mono" style="font-weight:700;font-size:18px">${b.ticker}</span>
          <span class="mono" style="font-weight:700;font-size:15px;color:var(--amber)">$${b.amount_usd}</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${b.price_at_flag?`<span class="mono" style="font-size:11px;color:var(--muted)">$${b.price_at_flag}</span>`:""}
          <span class="pill pill-dim">${b.composite||b.conviction||""}</span>
        </div>
      </div>
      ${convBarsHtml(cv)}
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:5px">
        <p style="font-size:12px;line-height:1.5;margin:0"><span style="color:var(--green);margin-right:5px">✓</span>${b.why||""}</p>
        ${b.risk?`<p style="font-size:12px;line-height:1.5;color:var(--muted);margin:0"><span style="color:var(--red);margin-right:5px">⚠</span>${b.risk}</p>`:""}
      </div>
    </div>`;
  });

  // Hit rate teaser
  const hr = DATA.hit_rate;
  if (hr && hr.total_picks_tracked > 0) {
    html += `<div class="divider"></div>`;
    html += `<div class="card-surface" style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--muted)">Hit rate</span>
      <span class="mono" style="font-size:14px;font-weight:700;color:${hr.hit_rate_pct>=50?"var(--green)":"var(--red)"}">${hr.hit_rate_pct.toFixed(0)}% <span style="font-size:10px;color:var(--dim)">(${hr.wins}/${hr.total_picks_tracked})</span></span>
    </div>`;
  }

  html += `<p class="mono" style="text-align:center;font-size:10px;color:var(--dim);margin-top:12px">Not investment advice · ${DATA.run_date||""}</p>`;
  document.getElementById("content").innerHTML = html;
}

// ── Portfolio ──────────────────────────────────────────────────────────────
function renderPortfolio() {
  const holdings = (DATA.holdings||[]).filter(h=>h.ticker&&h.ticker!=="EXAMPLE");
  const p = DATA.portfolio||{};
  const allocation = p.allocation||[];

  if (!holdings.length) {
    document.getElementById("content").innerHTML = `<div class="card-surface" style="text-align:center;padding:40px">
      <p style="font-size:36px;margin-bottom:12px">💼</p>
      <p class="mono" style="font-size:13px;color:var(--muted)">No holdings yet</p>
      <p style="font-size:12px;color:var(--dim);margin-top:8px;line-height:1.6">Add your trades to<br><span class="mono" style="color:var(--amber)">market-briefs/holdings.md</span><br>in Google Drive</p>
    </div>`;
    return;
  }

  const totalPos = (p.total_gain_pct||0) >= 0;
  let html = "";

  // Summary card
  html += `<div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span class="mono" style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Total Portfolio</span>
      <span class="mono" style="font-size:11px;color:var(--dim)">$${(p.total_invested||0).toFixed(0)} invested</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end">
      <div>
        <div class="mono" style="font-size:24px;font-weight:700">$${(p.total_current_value||0).toFixed(0)}</div>
        <div class="mono" style="font-size:13px;color:${totalPos?"var(--green)":"var(--red)"};font-weight:700;margin-top:3px">
          ${totalPos?"▲":"▼"} $${Math.abs(p.total_gain_usd||0).toFixed(0)} (${Math.abs(p.total_gain_pct||0).toFixed(1)}%)
        </div>
      </div>
      ${allocation.length ? donutSVG(allocation) : ""}
    </div>
  </div>`;

  // Individual holdings
  html += `<p class="section-label">Positions</p>`;
  holdings.forEach(h => {
    const pos = (h.gain_pct||0) >= 0;
    const alloc = allocation.find(a=>a.ticker===h.ticker)||{};
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="mono" style="font-weight:700;font-size:16px;margin-bottom:3px">${h.ticker}</div>
          <div style="font-size:11px;color:var(--muted)">Bought @ $${h.buy_price} · ${h.shares||0} shares</div>
        </div>
        <div style="text-align:right">
          <div class="mono" style="font-weight:700;font-size:16px">$${h.current_price}</div>
          <div class="mono" style="font-size:12px;color:${pos?"var(--green)":"var(--red)"};font-weight:700">${pos?"▲":"▼"} ${Math.abs(h.gain_pct||0).toFixed(1)}%</div>
          <div class="mono" style="font-size:10px;color:var(--dim)">$${Math.abs(h.gain_usd||0).toFixed(0)} ${pos?"gain":"loss"}</div>
        </div>
      </div>
      ${h.attention?`<div style="margin-top:8px;padding:6px 10px;background:var(--amber-dim);border-radius:var(--radius-sm);font-size:11px;color:var(--amber)">⚠ ${h.note||"Attention needed"}</div>`:""}
      ${alloc.weight_pct?`<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:10px;color:var(--dim)">Portfolio weight</span><span class="mono" style="font-size:10px;color:var(--dim)">${alloc.weight_pct.toFixed(1)}%</span></div><div class="hit-bar-bg"><div class="hit-bar-fill" style="width:${Math.min(alloc.weight_pct,100)}%;background:var(--amber)"></div></div></div>`:""}
    </div>`;
  });

  document.getElementById("content").innerHTML = html;
}

// ── Donut SVG ──────────────────────────────────────────────────────────────
function donutSVG(allocation) {
  const colors = ["#f59e0b","#58a6ff","#3fb950","#bc8cff","#f85149","#34d399"];
  const size = 90; const cx = 45; const cy = 45; const r = 35; const innerR = 22;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  let paths = "";
  allocation.forEach((a, i) => {
    const pct = Math.min(a.weight_pct||0, 100) / 100;
    const dash = pct * circ;
    const gap = circ - dash;
    paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[i%colors.length]}" stroke-width="10" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset * circ}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += pct;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}<circle cx="${cx}" cy="${cy}" r="${innerR}" fill="var(--card)"/></svg>`;
}

// ── Watchlist ──────────────────────────────────────────────────────────────
function renderWatchlist() {
  const stocks = DATA.watchlist_analysis||[];
  if (!stocks.length) {
    document.getElementById("content").innerHTML = `<div class="card-surface" style="text-align:center;padding:36px">
      <p style="font-size:36px;margin-bottom:10px">📋</p>
      <p class="mono" style="font-size:13px;color:var(--muted)">Watchlist is empty</p>
      <p style="font-size:12px;color:var(--dim);margin-top:6px;line-height:1.6">Edit <span class="mono" style="color:var(--amber)">market-briefs/watchlist.md</span> in Google Drive</p>
    </div>`;
    return;
  }
  let html = `<p class="section-label">📋 Watchlist <span style="font-size:10px;color:var(--dim)">${stocks.length} stocks · ${DATA.run_time_et||""}</span></p>`;
  stocks.forEach(s => {
    const v = s.verdict||"WATCH";
    const vc = v==="BUY"?"var(--green)":v==="AVOID"?"var(--red)":"var(--amber)";
    const vbg = v==="BUY"?"var(--green-dim)":v==="AVOID"?"var(--red-dim)":"var(--amber-dim)";
    const vborder = v==="BUY"?"rgba(63,185,80,0.25)":v==="AVOID"?"rgba(248,81,73,0.25)":"rgba(245,158,11,0.25)";
    const cp = s.change_pct;
    const hc = {"this week":"var(--amber)","2-4 weeks":"var(--blue)","longer term":"var(--purple)"}[s.time_horizon]||"var(--muted)";
    html += `<div class="card" style="border-color:${vborder};margin-bottom:9px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
            <span class="mono" style="font-weight:700;font-size:17px">${s.ticker}</span>
            <span style="font-size:11px;padding:3px 9px;border-radius:4px;font-family:var(--mono);font-weight:700;background:${vbg};color:${vc}">${v}</span>
          </div>
          <p style="font-size:11px;color:var(--muted)">${s.name||"—"}</p>
        </div>
        <div style="text-align:right">
          ${s.current_price?`<div class="mono" style="font-size:16px;font-weight:700">$${s.current_price}</div>`:""}
          ${cp!=null?`<div class="mono" style="font-size:11px;color:${cp>=0?"var(--green)":"var(--red)"}">${cp>=0?"▲":"▼"} ${Math.abs(cp).toFixed(1)}%</div>`:""}
        </div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:5px">
        <p style="font-size:12px;line-height:1.5;margin:0"><span style="color:var(--green);margin-right:5px">✓</span>${s.price_context||"—"}</p>
        <p style="font-size:12px;line-height:1.5;color:var(--muted);margin:0"><span style="color:var(--amber);margin-right:5px">→</span>${s.catalyst||"—"}</p>
        <p style="font-size:12px;line-height:1.5;color:var(--muted);margin:0"><span style="color:var(--red);margin-right:5px">⚠</span>${s.risk||"—"}</p>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:3px">
          <span class="pill pill-dim">${s.confidence||"—"}</span>
          <span style="font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--mono);color:${hc};background:transparent;border:1px solid ${hc}20">${s.time_horizon||"—"}</span>
        </div>
      </div>
    </div>`;
  });
  html += `<p class="mono" style="text-align:center;font-size:10px;color:var(--dim);margin-top:8px">Not investment advice · Analysis by Claude</p>`;
  document.getElementById("content").innerHTML = html;
}

// ── Hit Rate ───────────────────────────────────────────────────────────────
function renderHitRate() {
  const hr = DATA.hit_rate;
  if (!hr || hr.total_picks_tracked === 0) {
    document.getElementById("content").innerHTML = `<div class="card-surface" style="text-align:center;padding:40px">
      <p style="font-size:36px;margin-bottom:12px">📊</p>
      <p class="mono" style="font-size:13px;color:var(--muted)">No tracked picks yet</p>
      <p style="font-size:12px;color:var(--dim);margin-top:8px;line-height:1.6">Hit rate builds automatically<br>as past recommendations age<br>to T+1d, T+5d, T+30d</p>
    </div>`;
    return;
  }

  const hitColor = hr.hit_rate_pct >= 60 ? "var(--green)" : hr.hit_rate_pct >= 40 ? "var(--amber)" : "var(--red)";
  const avgColor = (hr.avg_t5d_return_pct||0) >= 0 ? "var(--green)" : "var(--red)";
  const picks = hr.recent_picks||[];

  let html = `<p class="section-label">📊 Track Record</p>`;

  // Big score card
  html += `<div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-around;text-align:center;margin-bottom:16px">
      <div>
        <div class="mono" style="font-size:36px;font-weight:700;color:${hitColor}">${hr.hit_rate_pct.toFixed(0)}%</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">Hit rate</div>
      </div>
      <div style="width:1px;background:var(--border)"></div>
      <div>
        <div class="mono" style="font-size:36px;font-weight:700;color:${avgColor}">${(hr.avg_t5d_return_pct||0)>=0?"+":""}${(hr.avg_t5d_return_pct||0).toFixed(1)}%</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">Avg T+5d</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;margin-bottom:12px">
      <span class="pill pill-success">${hr.wins} wins</span>
      <span class="pill pill-danger">${hr.losses} losses</span>
      ${hr.pending?`<span class="pill pill-dim">${hr.pending} pending</span>`:""}
    </div>
    <div class="hit-bar-bg"><div class="hit-bar-fill" style="width:${hr.hit_rate_pct}%;background:${hitColor}"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:4px">
      <span style="font-size:10px;color:var(--dim)">0%</span>
      <span style="font-size:10px;color:var(--dim)">100%</span>
    </div>
  </div>`;

  // Best / worst
  if (hr.best_pick?.ticker) {
    html += `<div style="display:flex;gap:9px;margin-bottom:9px">
      <div class="card" style="flex:1;margin-bottom:0">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px">🏆 Best pick</div>
        <div class="mono" style="font-size:15px;font-weight:700">${hr.best_pick.ticker}</div>
        <div class="mono" style="font-size:13px;color:var(--green);font-weight:700">+${hr.best_pick.return_pct?.toFixed(1)||0}%</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">${hr.best_pick.date||""}</div>
      </div>
      ${hr.worst_pick?.ticker?`<div class="card" style="flex:1;margin-bottom:0">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px">📉 Worst pick</div>
        <div class="mono" style="font-size:15px;font-weight:700">${hr.worst_pick.ticker}</div>
        <div class="mono" style="font-size:13px;color:var(--red);font-weight:700">${hr.worst_pick.return_pct?.toFixed(1)||0}%</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">${hr.worst_pick.date||""}</div>
      </div>`:""}
    </div>`;
  }

  // Recent picks table
  if (picks.length) {
    html += `<p class="section-label">Recent picks</p>`;
    html += `<div class="table-wrap">`;
    picks.forEach(pick => {
      const oc = pick.outcome==="WIN"?"var(--green)":pick.outcome==="LOSS"?"var(--red)":"var(--dim)";
      const ret = pick.t5d_return_pct;
      html += `<div class="table-row">
        <div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="mono" style="font-weight:700;font-size:13px">${pick.ticker}</span>
            <span style="font-size:10px;padding:1px 6px;border-radius:3px;font-family:var(--mono);color:${oc};background:${oc}20">${pick.outcome}</span>
          </div>
          <div style="font-size:10px;color:var(--dim);margin-top:2px">${pick.date||""} · $${pick.amount_usd||0}</div>
        </div>
        <div style="text-align:right">
          ${ret!=null?`<div class="mono" style="font-size:13px;font-weight:700;color:${ret>=0?"var(--green)":"var(--red)"}">${ret>=0?"+":""}${ret.toFixed(1)}%</div><div style="font-size:10px;color:var(--dim)">T+5d</div>`:`<div style="font-size:11px;color:var(--dim)">pending</div>`}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<p class="mono" style="text-align:center;font-size:10px;color:var(--dim);margin-top:8px">vs SPY benchmark · Past performance ≠ future results</p>`;
  document.getElementById("content").innerHTML = html;
}

// ── Conviction ─────────────────────────────────────────────────────────────
function renderConviction() {
  const list = DATA.conviction_list_summary||[];
  let html = `<p class="section-label">🎯 Conviction List <span style="font-size:10px;color:var(--dim)">${list.length} names</span></p>`;
  html += `<div class="table-wrap">`;
  list.forEach((c,i) => {
    const sc = c.status&&c.status.includes("Active")&&!c.status.includes("Watch")?"pill-success":c.status&&(c.status.includes("Contrarian")||c.status.includes("Low"))?"pill-danger":c.status&&c.status.includes("Candidate")?"pill-info":"pill-warn";
    const cv = typeof c.conviction==="number"?c.conviction:parseInt(c.conviction)||0;
    html += `<div class="table-row" style="align-items:flex-start;padding:12px 15px;${i<list.length-1?"":"border-bottom:none"}">
      <div>
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">
          <span class="mono" style="font-weight:700;font-size:13px">${c.ticker}</span>
          <span class="pill ${sc}">${c.status||""}</span>
        </div>
        ${c.catalyst?`<p style="font-size:11px;color:var(--muted)">${c.catalyst}</p>`:""}
      </div>
      <div style="text-align:right;flex-shrink:0">
        ${c.conviction!=null?convBarsHtml(cv):""}
        ${c.runs_flagged!=null?`<div class="mono" style="font-size:10px;color:var(--dim);margin-top:3px">${c.runs_flagged} runs</div>`:""}
      </div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}

// ── Macro ──────────────────────────────────────────────────────────────────
function renderMacro() {
  const m = DATA.macro||{};
  const etfs = Object.entries(DATA.sector_etfs||{}).filter(([,v])=>v.change_pct!=null);
  let html = `<p class="section-label">📊 Macro Snapshot</p>`;
  if (etfs.length) {
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:8px;margin-bottom:10px">`;
    etfs.forEach(([k,v]) => {
      const pos = v.change_pct>=0;
      html += `<div class="card-surface" style="text-align:center;padding:8px 10px"><div class="mono" style="font-size:10px;color:var(--muted);margin-bottom:3px">${k}</div><div class="mono" style="font-weight:700;font-size:14px;color:${pos?"var(--green)":"var(--red)"}">${pos?"+":""}${v.change_pct.toFixed(1)}%</div></div>`;
    });
    html += `</div>`;
  }
  const rows = [
    ["10Y yield", m.ten_year_yield_pct?`${m.ten_year_yield_pct}%`:null],
    ["Geopolitical", m.geopolitical],
    ["Next CPI", m.cpi_next],
    ["Next FOMC", m.fomc_next],
  ].filter(([,v])=>v);
  if (rows.length) {
    html += `<div class="table-wrap" style="padding:0 15px">`;
    rows.forEach(([k,v]) => {
      html += `<div style="display:flex;justify-content:space-between;gap:16px;padding:8px 0;border-bottom:1px solid var(--border)"><span class="mono" style="font-size:12px;color:var(--muted);min-width:110px">${k}</span><span style="font-size:12px;color:var(--text);text-align:right;flex:1">${v}</span></div>`;
    });
    html += `</div>`;
  }
  document.getElementById("content").innerHTML = html;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function convBarsHtml(v, max) {
  max = max||5;
  let html = `<div style="display:inline-flex;align-items:center;gap:3px">`;
  for (let i=0;i<max;i++) html += `<div style="width:11px;height:3px;border-radius:2px;background:${i<v?"var(--amber)":"var(--dim)"}"></div>`;
  html += `<span class="mono" style="font-size:10px;color:var(--dim);margin-left:5px">${v}/${max}</span></div>`;
  return html;
}

fetchData();
</script>
</body>
</html>
